name: Deploy viewer to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Expose the secret as a job env so the deploy step can be gated on its presence.
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run build # prebuild regenerates data from ../vault
      - name: Deploy to Cloudflare Pages
        # Skipped (not failed) until CLOUDFLARE_API_TOKEN is set on the repo.
        # Local `bun run deploy` uses your wrangler OAuth login instead.
        if: ${{ env.CF_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: viewer
          # wrangler.toml supplies name + pages_build_output_dir
          command: pages deploy dist --branch=main
